<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan de circulation</title>
    <link href="style.css" rel="stylesheet" />
    <link href="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.css" rel="stylesheet" />
</head>
<body>

<div id="map" style="width: 100%; height: 100vh;"></div>
<div id="zoom-overlay" class="hidden absolute inset-0 z-20 bg-black/50 flex items-center justify-center pointer-events-none">
    <span class="bg-white text-gray-800 px-6 py-3 rounded-lg shadow-lg text-lg font-medium">Zoomez davantage pour voir les rues</span>
</div>

<!-- Toolbar -->
<div class="absolute top-2 right-2 z-20 flex flex-col gap-2 pointer-events-none">
    <div class="bg-white rounded-lg shadow-lg p-2 flex flex-col gap-1 pointer-events-auto">
        <button data-tool="direction" class="px-3 py-1.5 rounded text-sm font-medium ring-2 ring-blue-500 bg-blue-50">Sens</button>
        <button data-tool="pedestrian" class="px-3 py-1.5 rounded text-sm font-medium">Piéton</button>
        <button data-tool="filter" class="px-3 py-1.5 rounded text-sm font-medium">Filtre</button>
        <button data-tool="bollard" class="px-3 py-1.5 rounded text-sm font-medium">Borne</button>
        <button data-tool="split" class="px-3 py-1.5 rounded text-sm font-medium">&#9986; Couper</button>
    </div>
    <div class="bg-white rounded-lg shadow-lg p-2 flex flex-col gap-1 pointer-events-auto">
        <button id="btn-check" class="px-3 py-1.5 rounded text-sm font-medium bg-gray-100 hover:bg-gray-200">Vérifier</button>
        <button id="btn-reset" class="px-3 py-1.5 rounded text-sm font-medium bg-gray-100 hover:bg-gray-200">Réinitialiser</button>
    </div>
    <div class="bg-white rounded-lg shadow-lg p-2 flex flex-col gap-1 pointer-events-auto">
        <button id="btn-routing" class="px-3 py-1.5 rounded text-sm font-medium bg-gray-100 hover:bg-gray-200">Itinéraire</button>
    </div>
    <div id="routing-panel" class="hidden bg-white rounded-lg shadow-lg p-3 pointer-events-auto text-sm">
        <div class="font-medium mb-2">Itinéraire</div>
        <div class="flex gap-1 mb-2">
            <button data-routing-mode="car" class="flex-1 px-2 py-1 rounded text-xs font-medium ring-2 ring-blue-500 bg-blue-50">Voiture</button>
            <button data-routing-mode="bike" class="flex-1 px-2 py-1 rounded text-xs font-medium bg-gray-100">Vélo</button>
        </div>
        <div class="text-xs text-gray-500 mb-2">Cliquez 2 points sur la carte</div>
        <div id="routing-distance" class="hidden text-sm font-medium text-blue-600 mb-2"></div>
        <div id="routing-error" class="hidden text-sm text-red-600 mb-2"></div>
        <button id="btn-clear-route" class="w-full px-2 py-1 rounded text-xs font-medium bg-gray-100 hover:bg-gray-200">Effacer</button>
    </div>
</div>

<!-- Légende -->
<div class="absolute bottom-2 left-2 z-20 bg-white/90 rounded-lg shadow-lg p-3 text-xs pointer-events-auto">
    <div class="font-medium mb-1.5">Légende</div>
    <div class="flex items-center gap-2 mb-1">
        <span class="inline-block w-6 h-0.5 bg-gray-400"></span>
        <span>Rue (inchangée)</span>
    </div>
    <div class="flex items-center gap-2 mb-1">
        <span class="inline-block w-6 h-0.5 bg-black"></span>
        <span>Sens modifié</span>
    </div>
    <div class="flex items-center gap-2 mb-1">
        <span class="inline-block w-6 h-0.5 bg-amber-500"></span>
        <span>Filtre modal</span>
    </div>
    <div class="flex items-center gap-2 mb-1">
        <span class="inline-block w-6 h-0.5 bg-purple-500"></span>
        <span>Rue bornée</span>
    </div>
    <div class="flex items-center gap-2">
        <span class="inline-block w-6 border-t-2 border-dashed border-green-500"></span>
        <span>Piétonne</span>
    </div>
    <div class="border-t border-gray-200 mt-2 pt-2">
        <div class="font-medium mb-1.5">Transport</div>
        <label class="flex items-center gap-2 mb-1 cursor-pointer">
            <input type="checkbox" id="toggle-tram" checked class="accent-blue-500">
            <span>Tram</span>
        </label>
        <label class="flex items-center gap-2 mb-1 cursor-pointer">
            <input type="checkbox" id="toggle-bus" class="accent-orange-500">
            <span>Bus</span>
        </label>
        <label class="flex items-center gap-2 mb-1 cursor-pointer">
            <input type="checkbox" id="toggle-traffic" class="accent-red-500">
            <span>Compteurs voitures</span>
        </label>
    </div>
    <div class="border-t border-gray-200 mt-2 pt-2">
        <div class="font-medium mb-1.5">Vélo</div>
        <label class="flex items-center gap-2 mb-1 cursor-pointer">
            <input type="checkbox" id="toggle-parlons-velo" class="accent-red-500">
            <span class="flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-full bg-red-500"></span>Points à améliorer</span>
        </label>
        <div class="text-[10px] text-gray-400 mt-1">Source : Baromètre Parlons Vélo 2025 — FUB</div>
    </div>
</div>

<img class="my-0 absolute bottom-0 right-0 z-10" src="assets/img/logo-VC-carte.png" width="75" height="75" alt="logo Vélo-Cité Bordeaux Métropole">
<script type="module">
    import { initializeMap } from './src/map.js';

    // Initialisation de la carte
    const map = initializeMap('map', '/assets/style.json');
</script>
</body>
</html>
