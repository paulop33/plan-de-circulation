security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: App\Security\JsonLoginSuccessHandler
                failure_handler: App\Security\JsonLoginFailureHandler
            logout:
                path: /api/auth/logout
            stateless: false

    access_control:
        # Public geo endpoints
        - { path: ^/api/data, roles: PUBLIC_ACCESS }
        - { path: ^/api/transit, roles: PUBLIC_ACCESS }
        - { path: ^/api/traffic, roles: PUBLIC_ACCESS }
        - { path: ^/api/parlons-velo, roles: PUBLIC_ACCESS }
        # Public auth endpoints
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/logout, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/me, roles: PUBLIC_ACCESS }
        # Public maps
        - { path: ^/api/maps/public, roles: PUBLIC_ACCESS }
        - { path: ^/api/maps/shared, roles: PUBLIC_ACCESS }
        # Admin
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        # All other API endpoints require authentication
        - { path: ^/api/, roles: ROLE_USER }
