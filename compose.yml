services:
  db:
    image: postgis/postgis:15-3.3
    container_name: postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-userdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-passdb}
      POSTGRES_DB: ${POSTGRES_DB:-geodatabase}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-userdb} -d ${POSTGRES_DB:-geodatabase}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_SECRET: changeme_in_production
      DATABASE_URL: "pdo-pgsql://${POSTGRES_USER:-userdb}:${POSTGRES_PASSWORD:-passdb}@db:5432/${POSTGRES_DB:-geodatabase}"
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN:-*}"
      MAILER_DSN: "smtp://mailpit:1025"
      IMPORT_MIN_LAT: "${IMPORT_MIN_LAT:-44.78}"
      IMPORT_MIN_LON: "${IMPORT_MIN_LON:--0.65}"
      IMPORT_MAX_LAT: "${IMPORT_MAX_LAT:-44.92}"
      IMPORT_MAX_LON: "${IMPORT_MAX_LON:--0.50}"
      GTFS_URL: "${GTFS_URL:-https://bdx.mecatran.com/utw/ws/gtfsfeed/static/bordeaux?apiKey=opendata-bordeaux-metropole-flux-gtfs-rt}"
      TRAFFIC_COUNTS_URLS: "${TRAFFIC_COUNTS_URLS:-}"
      TRAFFIC_SENSORS_URL: "${TRAFFIC_SENSORS_URL:-https://opendata.bordeaux-metropole.fr/api/explore/v2.1/catalog/datasets/pc_capte_p/exports/geojson?limit=-1}"
      PUNCTUAL_TRAFFIC_URL: "${PUNCTUAL_TRAFFIC_URL:-https://opendata.bordeaux-metropole.fr/api/explore/v2.1/catalog/datasets/pc_capte_ponct_p/exports/geojson?limit=-1}"
      PARLONS_VELO_URL: "${PARLONS_VELO_URL:-https://opendata.parlons-velo.fr/download/cc96c79e1c460a08d122b8d251286438.zip}"
    ports:
      - "${BACKEND_PORT:-8000}:80"

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
    container_name: frontend
    ports:
      - "8080:80"
    profiles:
      - prod

  frontend-dev:
    image: node:20-alpine
    container_name: frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_BACKEND_URL: "http://localhost:8000"
    ports:
      - "8080:5173"
    profiles:
      - dev

volumes:
  postgis_data:
    driver: local
  frontend_node_modules:
    driver: local
